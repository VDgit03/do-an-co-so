<div class="form-section reset-section">
    <div class="forgot-icon">
        <i class="fa-solid fa-lock"></i>
    </div>

    <h3>Đặt lại mật khẩu</h3>

    <p class="forgot-desc">Nhập mật khẩu mới của bạn</p>

    <form class="form-reset">
        <div class="field">
            <label>Mật khẩu mới</label>

            <div class="input">
                <input
                    type="password"
                    id="new-password"
                    placeholder="••••••••"
                />

                <i class="fa-solid fa-lock"></i>
            </div>
        </div>

        <div class="field">
            <label>Xác nhận mật khẩu</label>

            <div class="input">
                <input
                    type="password"
                    id="confirm-password"
                    placeholder="••••••••"
                />

                <i class="fa-solid fa-lock"></i>
            </div>
        </div>

        <button type="button" class="login" onclick="handleResetPassword()">
            Đổi mật khẩu
        </button>
    </form>
</div>
