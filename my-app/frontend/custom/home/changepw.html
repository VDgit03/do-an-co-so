<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="../css/home.css" />
        <link rel="stylesheet" href="../css/nav.css" />
        <link rel="stylesheet" href="../css/changepw.css" />
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
        />
        <title>Money Track</title>
    </head>
    <body>
        <div id="nav-container"></div>
        <main>
            <div class="form">
                <div class="logo-pw">
                    <i class="fa-solid fa-lock"></i>
                    <h2>Cập nhật mật khẩu</h2>
                </div>
                <div class="field">
                    <label>Mật khẩu cũ</label>
                    <div class="input">
                        <input
                            type="password"
                            id="oldPassword"
                            placeholder="Mật khẩu cũ"
                        />
                        <span class="eye" onclick="togglePassword(this)">
                            <i class="fa-regular fa-eye"></i>
                        </span>
                    </div>
                </div>
                <div class="field">
                    <label>Mật khẩu mới</label>
                    <div class="input">
                        <input
                            type="password"
                            id="newPassword"
                            placeholder="Mật khẩu mới"
                            oninput="checkStrength(this.value)"
                        />
                        <span class="eye" onclick="togglePassword(this)">
                            <i class="fa-regular fa-eye"></i>
                        </span>
                    </div>
                    <div class="strength-wrap" id="strength-bars">
                        <div class="s-seg" id="s1"></div>
                        <div class="s-seg" id="s2"></div>
                        <div class="s-seg" id="s3"></div>
                        <div class="s-seg" id="s4"></div>
                    </div>
                    <div class="strength-label" id="strength-text"></div>
                </div>
                <div class="field">
                    <label>Xác nhận mật khẩu</label>
                    <div class="input">
                        <input
                            type="password"
                            id="confirmPassword"
                            placeholder="Xác nhận mật khẩu mới"
                        />
                        <span class="eye" onclick="togglePassword(this)">
                            <i class="fa-regular fa-eye"></i>
                        </span>
                    </div>
                </div>
                <button onclick="handleChangePassword()">Đổi mật khẩu</button>
            </div>
            <div class="right">
                <div class="last-change">
                    <i class="fa-regular fa-clock"></i>Lần đổi gần nhất
                </div>
                <h2 id="last-date"></h2>
                <p id="last-ago"></p>
            </div>
        </main>
        <script src="../api/function.js"></script>
        <script>
            fetch("../nav.html")
                .then((res) => res.text())
                .then((data) => {
                    document.getElementById("nav-container").innerHTML = data;
                    loadUser();
                });
        </script>
    </body>
</html>
