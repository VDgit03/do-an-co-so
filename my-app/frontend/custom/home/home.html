<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="../css/nav.css" />
        <link rel="stylesheet" href="../css/home.css" />
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
        />
        <title>Money Track</title>
    </head>

    <body>
        <div class="home">
            <div id="nav-container"></div>
            <main>
                <header class="header">
                    <div>
                        <h2>Trang chủ</h2>
                        <div id="current-date"></div>
                    </div>
                    <div class="top-actions">
                        <button class="btn">
                            <i class="fa-regular fa-bell"></i>
                        </button>

                        <button class="btn">
                            <i class="fa-solid fa-plus"></i>
                            Thêm giao dịch
                        </button>
                    </div>
                </header>
                <div class="content">
                    <!-- chat -->
                    <div class="quick-box">
                        <h3>Hôm nay bạn có tiêu gì ko</h3>
                        <p>Ghi nhanh một khoản chi tiêu hoặc thu nhập mới</p>
                        <div class="quick-input">
                            <input type="text" placeholder="Nhập tại đây..." />
                            <button>Nhập nhanh</button>
                        </div>
                    </div>

                    <!-- cards -->
                    <div class="cards">
                        <div class="card-income"><h4>Thu nhập</h4></div>
                        <div class="card-expense"><h4>Chi tiêu</h4></div>
                        <div class="card-saving"><h4>Tiết kiệm</h4></div>
                        <div class="card-wallet"><h4>Số dư ví</h4></div>
                    </div>

                    <!-- general -->
                    <div class="general">
                        <div class="box">
                            <div class="box-header">
                                <h3>Giao dịch gần đây</h3>
                                <a
                                    href="/frontend/custom/transaction/transaction.html"
                                    >Xem tất cả</a
                                >
                            </div>
                        </div>

                        <div class="box">
                            <div class="box-header">
                                <h3>Chi tiêu theo danh mục</h3>
                                <a href="/frontend/custom/list/list.html"
                                    >Báo cáo</a
                                >
                            </div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </body>
    <script src="../api/home.js"></script>
    <script>
        fetch("../nav.html")
            .then((res) => res.text())
            .then((data) => {
                document.getElementById("nav-container").innerHTML = data;
                loadUser();
            });
    </script>
</html>
